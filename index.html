<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyle CV web</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --forest: #2d4a22;
            --leaf: #7fb069;
            --earth: #fdfbf7;
            --stone: #4a4a4a;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #e9edc9;
            background-image: radial-gradient(#ccd5ae 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--stone);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .form-container {
            background: var(--earth);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(45, 74, 34, 0.1);
            border: 1px solid #d4a37333;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            color: var(--forest);
            font-size: 32px;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--forest);
            font-size: 14px;
        }

        input, textarea {
            width: 100%;
            padding: 12px 18px;
            border: 2px solid #e9edc9;
            border-radius: 12px;
            background: #fff;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--leaf);
            background: #fdfcf0;
        }

        #img-preview {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 50%;
            margin: 10px auto;
            display: none;
            border: 3px solid var(--leaf);
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--forest);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
            transition: transform 0.2s;
        }

        .submit-btn:hover { background: var(--leaf); transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Profile Pic</h2>
        <form action="generate.php" method="POST" enctype="multipart/form-data">
            <div class="form-group" style="text-align: center;">
                <img id="img-preview" src="#" alt="Preview">
                <label for="profile_pic" style="cursor: pointer; color: var(--leaf);">+ Upload Profile Photo</label>
                <input type="file" name="profile_pic" id="profile_pic" accept="image/*" hidden>
            </div>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="fullname" placeholder="Kyle Castellano" required>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" required>
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" name="phone" required>
                </div>
            </div>

            <div class="form-group">
                <label><Address>Address</Address></label>
                <input type="text" name="address" required>
            </div>

            <div class="form-group">
                <label>Summary</label>
                <textarea name="summary" rows="3" required></textarea>
            </div>

            <div class="form-group">
                <label>Education</label>
                <textarea name="education" rows="2" required></textarea>
            </div>

            <div class="form-group">
                <label>Core Skills (Separate with commas)</label>
                <textarea name="skills" placeholder="Nature Photography, UI Design, Problem Solving" required></textarea>
            </div>

            <button type="submit" class="submit-btn">Generate/Submit</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
