<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyle CV web</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --forest: #2d4a22; --leaf: #7fb069; --earth: #fdfbf7; --stone: #4a4a4a; --wood: #bc6c25; }
        body { font-family: 'Quicksand', sans-serif; background-color: #e9edc9; color: var(--stone); display: flex; justify-content: center; padding: 40px 20px; }
        
        /* FORM STYLING */
        #form-ui { background: var(--earth); max-width: 600px; width: 100%; padding: 40px; border-radius: 30px; box-shadow: 0 15px 35px rgba(45,74,34,0.1); border: 1px solid #d4a37333; }
        h2 { font-family: 'Playfair Display', serif; color: var(--forest); text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: var(--forest); font-size: 14px; }
        input, textarea { width: 100%; padding: 12px 18px; border: 2px solid #e9edc9; border-radius: 12px; font-family: inherit; box-sizing: border-box; }
        #img-preview { width: 100px; height: 100px; object-fit: cover; border-radius: 50%; margin: 10px auto; display: none; border: 3px solid var(--leaf); }
        .submit-btn { width: 100%; padding: 15px; background: var(--forest); color: white; border: none; border-radius: 50px; font-weight: 600; cursor: pointer; }

        /* CV RESULT STYLING (Hidden by default) */
        #cv-ui { display: none; width: 100%; max-width: 850px; }
        .journal-page { background: #fff; border-radius: 40px 10px 40px 10px; overflow: hidden; display: flex; box-shadow: 20px 20px 60px rgba(0,0,0,0.05); }
        .sidebar { width: 280px; background: #f9fbf2; padding: 40px; border-right: 1px solid #e9edc9; text-align: center; }
        .profile-leaf { width: 150px; height: 150px; border-radius: 0 50% 0 50%; overflow: hidden; border: 4px solid var(--leaf); margin: 0 auto 20px; }
        .profile-leaf img { width: 100%; height: 100%; object-fit: cover; }
        .main-content { padding: 50px; flex: 1; }
        h1 { font-family: 'Playfair Display', serif; font-size: 38px; color: var(--forest); margin: 0; }
        .section-title { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--wood); border-bottom: 1px solid #ccd5ae; margin: 30px 0 10px; padding-bottom: 5px; }
        .text-block { font-size: 15px; line-height: 1.6; white-space: pre-line; }
        .skill-tag { display: inline-block; background: #e9edc9; color: var(--forest); padding: 5px 12px; border-radius: 20px; font-size: 12px; margin: 0 5px 5px 0; font-weight: bold; }
        
        .controls { margin-top: 30px; display: flex; gap: 10px; justify-content: center; }
        .btn { padding: 10px 20px; border-radius: 30px; border: none; cursor: pointer; font-weight: bold; font-family: inherit; }
        
        @media print { .controls, #form-ui { display: none !important; } .journal-page { box-shadow: none; border: none; } }
    </style>
</head>
<body>

    <div id="form-ui">
        <h2>Profile Creator</h2>
        <form id="cvForm">
            <div style="text-align: center;" class="form-group">
                <img id="img-preview" src="#" alt="Preview">
                <label for="profile_pic" style="cursor: pointer; color: var(--leaf);">+ Upload Photo</label>
                <input type="file" id="profile_pic" accept="image/*" hidden>
            </div>
            <div class="form-group"><label>Full Name</label><input type="text" id="fn" placeholder="Kyle Castellano" required></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="form-group"><label>Email</label><input type="email" id="em" required></div>
                <div class="form-group"><label>Phone</label><input type="tel" id="ph" required></div>
            </div>
            <div class="form-group"><label>Address</label><input type="text" id="ad" required></div>
            <div class="form-group"><label>Summary</label><textarea id="sm" rows="3" required></textarea></div>
            <div class="form-group"><label>Education</label><textarea id="ed" rows="2" required></textarea></div>
            <div class="form-group"><label>Skills (comma separated)</label><textarea id="sk" placeholder="Design, Code" required></textarea></div>
            <button type="submit" class="submit-btn">Generate CV</button>
        </form>
    </div>

    <div id="cv-ui">
        <div class="journal-page">
            <aside class="sidebar">
                <div class="profile-leaf"><img id="out-img" src="" alt="Profile"></div>
                <div style="text-align: left; font-size: 12px;">
                    <p><i class="fa fa-envelope"></i> <span id="out-em"></span></p>
                    <p><i class="fa fa-phone"></i> <span id="out-ph"></span></p>
                    <p><i class="fa fa-map-marker"></i> <span id="out-ad"></span></p>
                </div>
            </aside>
            <main class="main-content">
                <h1 id="out-fn"></h1>
                <p style="color: var(--leaf); font-weight: bold;">Creative // Nature Enthusiast</p>
                <div class="section-title">Personal Growth</div>
                <div class="text-block" id="out-sm"></div>
                <div class="section-title">Academic Roots</div>
                <div class="text-block" id="out-ed"></div>
                <div class="section-title">Cultivated Skills</div>
                <div id="out-sk"></div>
            </main>
        </div>
        <div class="controls">
            <button class="btn" style="background:var(--forest); color:white;" onclick="window.print()">Export PDF</button>
            <button class="btn" onclick="location.reload()">Back to Edit</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
